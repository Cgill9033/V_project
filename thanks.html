<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            /* Custom background image - replace 'your-background.jpg' with your image file */
            /* background-image: url('your-background.jpg'); */
            /* background-size: cover; */
            /* background-position: center; */
            /* If no image, use the gradient below */
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 3em;
            color: #ff4757;
            text-shadow: 2px 2px 0px #ffa726, 4px 4px 0px #ff5722, 6px 6px 0px #f44336;
            margin-bottom: 20px;
            font-weight: bold;
            transform: rotate(-2deg);
        }

        p {
            font-size: 1.5em;
            color: #2d3436;
            margin: 20px 0;
        }

        .hearts {
            font-size: 2em;
            color: #e91e63;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Graffiti style */
        .graffiti {
            font-family: 'Impact', sans-serif;
            font-size: 2.5em;
            color: #e8f0f1;
            text-shadow: 
                2px 2px 0px #000,
                4px 4px 0px #ff0000,
                6px 6px 0px #00ff00,
                8px 8px 0px #0000ff;
            transform: rotate(5deg);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <!-- Background video - replace 'your-video.mp4' with your video file -->
    <!-- <video autoplay loop muted style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
        <source src="your-video.mp4" type="video/mp4">
    </video> -->
    <!-- Background video - replace 'your-video.mp4' with your video file -->
    <video autoplay loop muted style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
        <source src="BG_Vd.mp4" type="video/mp4">
    </video>
    <div class="container">
        <h1 class="graffiti">Thanks Miss !</h1>
        <p>I love you so so so much! 💕</p>
        <div class="hearts">❤️ 💖 💗 💓 💞</div>
    </div>
</body>
</html>
